<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120" width="640" height="120" role="img" aria-label="Waypoint — your learning, mapped">
  <title>Waypoint — your learning, mapped</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500&amp;display=swap');
      .wp-way   { font-family: 'Ubuntu', 'Segoe UI', system-ui, sans-serif; font-weight: 500; font-size: 36px; fill: #085041; }
      .wp-point { font-family: 'Ubuntu', 'Segoe UI', system-ui, sans-serif; font-weight: 300; font-size: 36px; fill: #1D9E75; }
      .wp-tag   { font-family: 'Ubuntu', 'Segoe UI', system-ui, sans-serif; font-weight: 300; font-size: 18px; fill: #888780; }
    </style>
  </defs>

  <!-- Background -->
  <!-- <rect width="640" height="120" fill="#FDFCF9" rx="12"/> -->

  <!-- ── Mark ── -->
  <!-- Outer diamond -->
  <polygon points="52,14 84,46 52,78 20,46" fill="#1D9E75"/>
  <!-- Inner diamond -->
  <polygon points="52,21 76,45 52,69 28,45" fill="#0F6E56"/>
  <!-- Centre ring -->
  <circle cx="52" cy="46" r="9.5" fill="#FDFCF9"/>
  <circle cx="52" cy="46" r="4.5" fill="#1D9E75"/>
  <!-- Pin tail -->
  <rect x="47" y="77" width="10" height="13" rx="1.5" fill="#1D9E75"/>
  <polygon points="43,88 61,88 52,100" fill="#1D9E75"/>

  <!-- ── Wordmark ── -->
  <text y="57" font-family="'Ubuntu', 'Segoe UI', system-ui, sans-serif" font-size="36">
    <tspan x="100" font-weight="500" fill="#085041">way</tspan><tspan font-weight="300" fill="#1D9E75">point</tspan>
  </text>

  <!-- ── Divider ── -->
  <line x1="330" y1="30" x2="330" y2="70" stroke="#D3D1C7" stroke-width="1"/>

  <!-- ── Tagline ── -->
  <text x="348" y="53" class="wp-tag">your learning, mapped</text>

</svg>
