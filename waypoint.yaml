# =============================================================================
# waypoint.yaml — Live Demo
# =============================================================================
# Welcome to waypoint! This is a live, interactive demo — a learning path
# about waypoint itself. Click any status badge to update your progress.
#
# Ready to build your own? Fork the repo and replace this file:
# https://github.com/dustinestes/waypoint
# =============================================================================

subjects:

