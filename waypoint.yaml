  # committing to using it.
  # ---------------------------------------------------------------------------

  - id: what-is-waypoint
    title: "What is waypoint?"
    description: "The concept, the philosophy, and whether waypoint fits your learning style"
    estimated_time: "15 minutes"

    milestones:

      - id: the-concept
        title: "The Concept"
        description: "What waypoint is, how it works, and who it is built for"
        order: 1
        estimated_time: "15 minutes"

        modules:

          - id: overview
            title: "Overview"
            order: 1
            type: reading
            difficulty: beginner
            estimated_time: "5 minutes"
            status: not_started
            started_date:
            completed_date:
            resources:
              - type: external
                label: "Docs"
                url: "https://github.com/dustinestes/waypoint#readme"

          - id: how-it-works
            title: "How It Works"
            order: 2
            type: reading
            difficulty: beginner
            estimated_time: "5 minutes"
